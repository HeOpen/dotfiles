# ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar = false
    grace = 3
    hide_cursor = true
    no_fade_in = false
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 5
    blur_size = 2
    noise = 0.02
    contrast = 2.3000
    brightness = 0.5
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

auth {
    fingerprint:enabled = true
    fingerprint:ready_message = Отсканируйте отпечаток...
    fingerprint:present_message =󰈷 Сканирование...
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 1.0)

    font_size = 128
    font_family = JetBrainsMono Nerd Font

    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(LC_TIME=ru_RU.UTF-8 date +"%A, %d %B %Y")"
    color = rgba(220, 220, 220, 1.0)

    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, 20
    halign = center
    valign = center
}

# User
label {
    monitor =
    text = 󰠥 $USER
    color = rgb(255, 255, 255)

    font_size = 20
    font_family = JetBrainsMono Nerd Font

    position = 0, -110
    halign = center
    valign = center
}

# Password box
input-field {
    monitor =

    size = 320, 55
    outline_thickness = 3

    dots_size = 0.25
    dots_spacing = 0.30
    dots_center = true

    outer_color = rgb(90, 90, 90)
    inner_color = rgb(30, 30, 30)
    font_color = rgb(230, 230, 230)

    # Feedback customization
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_transition = 300

    fade_on_empty = false
    placeholder_text = <i>󰟵   введите пароль$FPRINTPROMPT</i>

    position = 0, -180
    halign = center
    valign = center
}

# Finger Print
label {
    monitor =

    text =
    color = rgba(255, 255, 255, 0.25k)

    font_size = 60
    font_family = JetBrainsMono Nerd Font

    position = 0, -280
    halign = center
    valign = center
}
